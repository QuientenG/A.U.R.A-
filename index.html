<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing');

    // WARNING: Keep your GitHub repo PRIVATE if you put a key here!
    const API_KEY = 'sk-abcdef1234567890abcdef1234567890abcdef12'; 
    const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
    
    // We are using a powerful open-source model that has minimal restrictions
    const AI_MODEL = 'nousresearch/hermes-3-llama-3.1-405b'; 

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
        msgDiv.textContent = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';
        typingIndicator.style.display = 'block';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': 'https://your-github-pages-url.com', // Optional
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    model: AI_MODEL,
                    messages: [{ role: "user", content: text }]
                })
            });

            if (!response.ok) throw new Error('API Error');
            
            const data = await response.json();
            
            typingIndicator.style.display = 'none';
            // Extract the text from the API response
            if(data.choices && data.choices[0] && data.choices[0].message) {
                addMessage(data.choices[0].message.content, 'ai');
            } else {
                addMessage('[System Error: Unexpected API response format.]', 'ai');
            }

        } catch (error) {
            typingIndicator.style.display = 'none';
            console.error('Error:', error);
            addMessage('[System Error: Could not connect to API. Check your API key and network.]', 'ai');
        }
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>
